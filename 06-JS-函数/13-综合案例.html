<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    // 1.用户输入总秒数
    let second = +prompt('请输入秒数：')

    // 2.封装函数
    function getTime(t) {
      // console.log(t);//总的秒数
      // 3.转换
      h = parseInt(t / 60 / 60 % 24)
      m = parseInt(t / 60 % 60)
      s = parseInt(t % 24)
      h = h < 10 ? '0' + h : h
      m = m < 10 ? '0' + m : m
      s = s < 10 ? '0' + s : s
      // console.log(h,m,s);
      return `转换完毕是${h}小时${m}分${s}秒`
    }
    // 4.调用函数
    let str = getTime(second)
    document.write(str)
  </script>
</body>
</html>
