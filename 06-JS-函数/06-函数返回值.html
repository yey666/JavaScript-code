<body>
  <script>
    // 函数的返回值应该在我需要的地方返回
    function fn() {
      return 20
    }
    //上面函数的意思是fn() = 20，将20赋值给fn()

    // console.log(fn())

    let re = fn() //返回值等于fn()
    console.log(re)
    
    
  </script>
</body>
