<body>
  <script>
    // 1.封装函数
    // 给函数一个默认值
    function getArrSum(arr = []) { 
      // console.log(arr)
      let sum = 0
      for(let i = 0;i < arr.length ;i++){
        sum += arr[i]
      }
      console.log(sum)
      
    }
    getArrSum([1,2,3,4,5,6])//数组里面的内容是实参
  </script>
</body>
