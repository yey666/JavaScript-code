<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    // 隐式转换：+号两边只要有一个为字符串，都会把另外一个转成字符串
    // 然后只要有-*/%减乘除取余，都会把数据转成数字类型
    console.log(1 + 1)
    console.log('pink' + 1)
    console.log(2 + 2)
    console.log(2 + '2')
    console.log(2 -'2') //0
    console.log(+12)
    console.log(+'123')//+号也可以转换为数字型
    
    
    
    </script>
</body>
</html>
