<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        h2 {
            text-align: center;
        }

        .box {
            width: 600px;
            margin: 50px auto;
            display: flex;
            font-size: 25px;
            line-height: 40px;
        }

        .qs {

            width: 450px;
            height: 40px;
            color: red;

        }

        .btns {
            text-align: center;
        }

        .btns button {
            width: 120px;
            height: 35px;
            margin: 0 50px;
        }
    </style>
</head>

<body>
  <!-- 1.点击开始按钮随机抽取数组的一个数据，放到页面中 -->
  <!-- 2.点击结束按钮删除数组当前抽取的一个数据 -->
  <!-- 3.当抽取到最后一个数据的时候，两个按钮同时禁用（写点开始里面，只剩最后一个数据不用抽了） -->
  <!-- 核心：利用定时器快速展示，停止定时器结束展示 -->
    <h2>随机点名</h2>
    <div class="box">
        <span>名字是：</span>
        <div class="qs">这里显示姓名</div>
    </div>
    <div class="btns">
        <button class="start">开始</button>
        <button class="end">结束</button>
    </div>

    <script>
        // 数据数组
        const arr = ['马超', '黄忠', '赵云', '关羽', '张飞']
        
        let timerID = 0
        let random = 0
        // 业务1.开始按钮模块
        // 1.1获取开始按钮元素
        // 得到这个随机元素是为了放到qs盒子里面去
        const qs = document.querySelector('.qs')
        const start = document.querySelector('.start')
        start.addEventListener('click',function(){
            // 用定时器抽取名字
            timerID = setInterval(function(){
            random = parseInt(Math.random() * arr.length)
            qs.innerHTML = arr[random]
            },35)

            //如果数组里面只有一个值了，还需要抽取吗？  不需要了 让两个按钮禁用就可以了
            if(arr.length === 1) {
                // start.disabled = true
                // end.disabled = true
                start.disabled = end.disabled = true
            }
            
        })

        // 业务2.结束按钮模块
        // 2.1点击结束按钮，定时结束
        const end = document.querySelector('.end')
        end.addEventListener('click',function(){
            clearInterval(timerID)// 结束
            // 结束后抽取出来的名字应该从数组中移除
            arr.splice(random,1)
            console.log(arr)
            
        })
    </script>
</body>

</html>
