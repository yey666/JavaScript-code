<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <button>点击</button>
  <script>
    // 每个函数里面都有this 环境对象
    // function fn() {
    //   console.log(this)
      
    // }
    // fn()
    const btn = document.querySelector('button')
    btn.addEventListener('click',function(){
      //谁调用 this就是谁
      console.log(this) //btn 
      // btn.style.color = 'red'
      this.style.color = 'red'

      
    })
  </script>
</body>
</html>
