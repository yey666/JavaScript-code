<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .box {
      position: relative;
      margin: 0 auto;
      width: 400px;
      height: 200px;
      background-color: palegreen;
      line-height: 20px;
      font-size: 50px;
      line-height: 20px;
      font-weight: 700;
      
    }
    .close {
      position: absolute;
      right: 20px;
      top: 10px;
      width: 20px;
      height: 20px;
      background-color: skyblue;
      text-align: center;
      line-height: 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    我是广告
    <div class="close">X</div>
  </div>
  <script>
    // 1.获取事件源：close
    // 2.事件侦听：点击
    // 3.事件处理程序：关闭大盒子
    const close = document.querySelector('.close')
    const box = document.querySelector('.box')

    close.addEventListener('click',function() {
      // 关闭大盒子是：隐藏掉 用display
      box.style.display = 'none'
    })

  </script>
</body>
</html>
