<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <button>点击</button>
  <script>
    const btn = document.querySelector('button')
    // 这种on的事件监听写法 会覆盖掉前一个
    // btn.onclick = function() {
    //   alert(11)
    // }
    // btn.onclick = function() {
    //   alert(22)
    // }
    // 而这种不会
    btn.addEventListener('click',function(){
      alert(11)
    })
    btn.addEventListener('click',function(){
      alert(22)
    })
  </script>
</body>
</html>
