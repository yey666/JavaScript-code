<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    span {
        display: inline-block;
        width: 80px;
        padding: 5px 10px;
        border: 1px solid pink;
        margin: 2px;
        border-radius: 5px;
        box-shadow: 2px 2px 2px rgab(255,192,203,.4);
        background-color: rgba(255,192,203,.1);
    }
  </style>
  
</head>
<body>
  <script>
    for(let i = 0;i <= 9; i++){
      for(let j = 1;j <= i;j++){
        document.write(`<span>${j} X ${i} = ${i * j}</span>`)
      }
      document.write('<br>')
    }
  </script>
</body>
</html>
