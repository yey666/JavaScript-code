<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    
    //1.声明
    let obj = {
      'goods-name': '小米10青春版',
      num: '100002569',
      weight: '0.55kg',
      address: '中国大陆'
    }
    
    //2.使用属性 查 ‘对象名.属性名’
    console.log(obj.address)
    //查的另外一种写法 ‘对象名['属性名']’
    console.log(obj['goods-name']);
    

    //3.使用属性 改 
    obj.name = '小米11青春版'
    console.log(obj)

    //4.使用属性 增
    obj.height = '13.5cm'
    console.log(obj)

    //5.使用属性 删 了解就行
    delete obj.height
    console.log(obj)
    
    
    
    
    
  </script>
</body>
</html>
