<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    // 1.随机生成一个数字1~10
    function getRandom(N,M) {
      return Math.floor(Math.random() * (M-N+1) + N)
    }
    let random = getRandom(1,10)
    // 2.设定3次，3次没猜对就直接退出
    let flag = true
    for(let i = 1;i <= 3;i++){
       let num = +prompt('请输入你猜的数字：')
        if(num > random) {
          alert('数字猜大了，继续猜')
        }else if(num < random){
          alert('数字猜小了，继续猜')
        }else {
          flag = false
          alert('猜对了')
          break
        }
    }
        if(flag) {
          alert('次数已经用完了')
        }
  </script>
</body>
</html>
