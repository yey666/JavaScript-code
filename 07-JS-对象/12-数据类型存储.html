<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    let num1 = 10
    let num2 = num1 //赋值过去的是值
    num2 = 20
    console.log(num1) //10

    let obj1 = {
      age: 18
    }
    let obj2 = obj1 //赋值过去的是地址，所以修改obj2,obj1也会变
    //修改属性
    obj2.age = 20
    console.log(obj1.age)
    
  </script>
</body>
</html>
