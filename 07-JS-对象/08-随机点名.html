<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    let arr = ['赵云','黄忠','关羽','张飞','刘备','曹操']
    // 1.得到一个随机数，作为数组的索引号，取值范围是0~arr.length
    let random = Math.floor(Math.random() * arr.length)
    // 2.页面输出数组里面的元素
    console.log(arr[random])
    //3.splice(起始位置，删除几个元素)
    arr.splice(random,1)
    console.log(arr)
    
  </script>
</body>
</html>
