  <script>

    // 1.遍历对象用 for in
    let obj = {
      uname: 'kkk',
      age: '18',
      gender: '女'
    }
    // 2.遍历对象
    // 获得对象属性是k；获得对象值是obj[k]
    for(let k in obj) {
      console.log(k) //属性名 'uname' 'age' 'gender' 字符串类型
      console.log(obj[k])//输出属性值 obj[k]
      
      
    }
  </script>
