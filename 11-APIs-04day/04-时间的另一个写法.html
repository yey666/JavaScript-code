<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    div {
      width: 400px;
      height: 40px;
      background-color: silver;
      text-align: center;
      line-height: 40px;
    }
  </style>
</head>
<body>
  <div></div>
  <script>
    const div = document.querySelector('div')
    // 得到日期对象
    const date = new Date()
    div.innerHTML = date.toLocaleString()  //2026/5/26 15:57:08
    // div.innerHTML = date.toLocaleDateString()  //2026/5/26
    // div.innerHTML = date.toLocaleTimeString()  //2026/5/26
    setInterval(function () {
      const date = new Date()
      div.innerHTML = date.toLocaleString() 
    },1000)
  </script>
</body>
</html>
