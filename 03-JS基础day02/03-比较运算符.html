<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    console.log(3>5)
    console.log(3>=3)
    // 比较运算符有隐式转换
    console.log(3=='3')
    // ===三个等号叫全等，判断值和数据类型都一样才行
    console.log(3==='3')
    console.log(NaN === NaN)//NaN不等于任何人 包括它本身
    //字符串也可以比较大小 比较的是ASCII值，a=97
    console.log('a' < 'b')
    // aa与ab比较，第一个字符相等，再比较第二个
    console.log('aa' < 'ab')

    
    
  </script>
</body>
</html>
