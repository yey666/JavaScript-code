<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tab栏切换</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    .tab {
      width: 590px;
      height: 340px;
      margin: 20px;
      border: 1px solid #e4e4e4;
    }

    .tab-nav {
      width: 100%;
      height: 60px;
      line-height: 60px;
      display: flex;
      justify-content: space-between;
    }

    .tab-nav h3 {
      font-size: 24px;
      font-weight: normal;
      margin-left: 20px;
    }

    .tab-nav ul {
      list-style: none;
      display: flex;
      justify-content: flex-end;
    }

    .tab-nav ul li {
      margin: 0 20px;
      font-size: 14px;
    }

    .tab-nav ul li a {
      text-decoration: none;
      border-bottom: 2px solid transparent;
      color: #333;
    }

    .tab-nav ul li a.active {
      border-color: #e1251b;
      color: #e1251b;
    }

    .tab-content {
      padding: 0 16px;
    }

    .tab-content .item {
      display: none;
    }

    .tab-content .item.active {
      display: block;
    }
  </style>
</head>

<body>
  <div class="tab">
    <div class="tab-nav">
      <h3>每日特价</h3>
      <ul>
        <li><a class="active" href="javascript:;" data-id="0">精选</a></li>
        <li><a href="javascript:;"data-id="1">美食</a></li>
        <li><a href="javascript:;"data-id="2">百货</a></li>
        <li><a href="javascript:;"data-id="3">个护</a></li>
        <li><a href="javascript:;"data-id="4">预告</a></li>
      </ul>
    </div>
    <div class="tab-content">
      <div class="item active"><img src="./images/tab00.png" alt="" /></div>
      <div class="item"><img src="./images/tab01.png" alt="" /></div>
      <div class="item"><img src="./images/tab02.png" alt="" /></div>
      <div class="item"><img src="./images/tab03.png" alt="" /></div>
      <div class="item"><img src="./images/tab04.png" alt="" /></div>
    </div>
  </div>

  <script>
    // 采取事件委托的形式 进行tab栏切换
    // 1.获取父元素 ul 
    const ul = document.querySelector('.tab-nav ul')
    // 2.添加事件
    ul.addEventListener('click',function(e){
      // console.log(e.target)  //e.target 是我们点击的对象
      // 我们只有点击了 a  才会 进行 添加类和删除类操作
      // console.log(e.target.tagName)  //是标签名 是大写A

      if(e.target.tagName === 'A') {
        // console.log('我选的是a')
        //排他思想，先移除 tab-nav里面的active 
        document.querySelector('.tab-nav .active').classList.remove('active')  //active 为什么不需要加点
        // 当前元素添加active  是e.target
        // this 指向ul不能用this
        e.target.classList.add('active')
        
        // 下面大盒子模块  加一个自定义属性来选中li对应的大盒子
        // console.log(e.target.dataset.id)
        const i = +e.target.dataset.id  //bug 取过来是字符串，要转为数字型
        //排他思想，先移除 tab-content里面的active 
        document.querySelector('.tab-content .active').classList.remove('active')
        // 对应大盒子 添加active 
        // 写法1： document.querySelector(`.tab-content .item:nth-child(${i + 1})`).classList.add('active')
        // 写法2:
        // 先获取所有的item
        const items = document.querySelectorAll('.tab-content .item')
        items[i].classList.add('active')

      }
    })
  </script>
</body>

</html>
