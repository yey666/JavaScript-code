<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <!-- 事件委托相当于用一个数组把元素组织起来吗？ 父与子的关系? -->
   <!-- 如何找到真正触发的元素  事件对象.target.tagName -->
   <ul>
    <li>第1个孩子</li>
    <li>第2个孩子</li>
    <li>第3个孩子</li>
    <li>第4个孩子</li>
    <li>第5个孩子</li>
    <p>别点我,我不需要变色</p>
   </ul>
   <script>
    // 点击每个小li 当前li 文字变红色
    // 按照事件委托的方式  委托给了父亲  事件绑定到父元素身上
    // 1.获取父元素
    const ul = document.querySelector('ul')
    ul.addEventListener('click',function(e){
      // alert('11')
      // this.style.color = 'red'  //在这里this指的是 父元素 没办法通过这样使点击哪个小li让哪个小li变色
      // console.log(e.target) //就是我们点击的对象 li
      // e.target.style.color = 'red'
      
      // 我的需求,我们只有点小li才会有效果
       if(e.target.tagName === 'LI') {
        e.target.style.color = 'red'
       }
    })
   </script>
</body>
</html>
