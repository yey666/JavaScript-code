<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .mum {
      width: 400px;
      height: 400px;
      background-color: pink;
    }
    .bady {
      width: 200px;
      height: 200px;
      background-color: palevioletred;
    }
  </style>
</head>
<body>
  <div class="mum">
    <div class="bady"></div>
  </div>
  <script>
    // mouseenter和mouseleave 不会冒泡
    const mum = document.querySelector('.mum')
    const bady = document.querySelector('.bady')
    mum.addEventListener('mouseenter',function(){
      console.log('鼠标经过')
      
    })
    mum.addEventListener('mouseleave',function(){
      console.log('鼠标离开')
      
    })
  </script>
</body>
</html>
