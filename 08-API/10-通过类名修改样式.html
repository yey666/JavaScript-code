<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
  div {
    width: 200px;
    height: 200px;
    background-color: pink;
  }
  .nav {
    color: #fff;
  }
  .box {
    width: 300px;
    height: 300px;
    background-color: skyblue;
    margin: 100px auto;
    padding: 10px;
    border: 1px solid #000
  }
  </style>
  
</head>
<body>
  <div class = "nav">123</div>
  <script>
    //1.获取元素
    const div = document.querySelector('div')
    //2.添加类名 元素.className = '类名' className是用新值换旧值，会覆盖前一个
    div.className = 'nav box'
  </script>
</body>
</html>
