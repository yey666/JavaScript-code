<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .box {
      width: 200px;
      height: 200px;
      background-color: #789;
    }
  </style>
</head>
<body>
  <div class="box"></div>
  <script>
    // 1.获取元素
    const box = document.querySelector('.box')
    //2.修改样式属性 对象.style.样式 = '值'
    box.style.width = '400px'
    box.style.backgroundColor = '#888888'//多组单词采用小驼峰命名法
    box.style.border = '5px solid #111'
    box.style.borderTop = '10px solid #111'
  </script>
</body>
</html>
